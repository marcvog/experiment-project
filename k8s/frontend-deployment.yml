apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
        - name: ghcr.io
      containers:
        - name: frontend
          image: ghcr.io/marcvog/experiment-frontend:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
