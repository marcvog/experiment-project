name: Build and Push Images

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # Backend
      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/experiment-backend:$VERSION ./experiment-tracker

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/experiment-backend:$VERSION

      # Frontend
      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/experiment-frontend:$VERSION ./experiment-ui

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/experiment-frontend:$VERSION

