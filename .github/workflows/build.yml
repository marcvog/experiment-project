name: Build and Push Images

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Extract version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      # Backend
      - name: Build backend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/experiment-backend:$VERSION ./experiment-tracker

      - name: Push backend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/experiment-backend:$VERSION

      # Frontend
      - name: Build frontend image
        run: |
          docker build -t ghcr.io/${{ github.repository_owner }}/experiment-frontend:$VERSION ./experiment-ui

      - name: Push frontend image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/experiment-frontend:$VERSION

      - name: Update backend image tag
        run: |
          yq -i ".backend.image.tag = \"$VERSION\"" experiment-chart/values.yaml

      - name: Update frontend image tag
        run: |
          yq -i ".frontend.image.tag = \"$VERSION\"" experiment-chart/values.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add git add experiment-chart/
          git commit -m "Update image tag to $VERSION" || echo "No changes to commit"
          git push origin HEAD:main

